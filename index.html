<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px}

.page{
  --ink:#15130f;
  --paper:#ffffff;
  --cream:#f6efdc;
  --amber:#f4bb4c;
  --mint:#8fd0c4;
  --coral:#f2764a;
  display:flex;
  flex-direction:column;
  gap:20px;
  background:var(--paper);
  padding:14px;
  border-radius:4px;
}

.app{
  display:flex;
  align-items:flex-start;
  gap:16px;
}

/* ---------- Side panel ---------- */
.panel{
  width:266px;
  flex:0 0 266px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.panel-title{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  padding:0 2px 2px;
}
.panel-title h1{
  font-size:16px;
  font-weight:800;
  letter-spacing:.02em;
  text-transform:uppercase;
  color:var(--ink);
}
.panel-title span{
  font-size:9px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--ink);
  opacity:.55;
}

.card{
  position:relative;
  background:var(--paper);
  border:2.5px solid var(--ink);
  border-radius:14px;
  box-shadow:4px 4px 0 var(--ink);
  padding:11px 12px;
}

.swatch-card{
  background:var(--cream);
  display:flex;
  align-items:center;
  gap:10px;
}
.badge-live{
  position:absolute;
  top:-11px;right:10px;
  background:var(--amber);
  border:2px solid var(--ink);
  border-radius:20px;
  padding:2px 8px;
  font-size:9px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
  transform:rotate(-3deg);
}
.swatch-big-wrap{position:relative;flex-shrink:0}
.swatch-big{
  width:52px;height:52px;
  border-radius:12px;
  border:2.5px solid var(--ink);
  background:#332453;
}
.swatch-big-wrap input[type=color]{
  position:absolute;inset:0;
  width:100%;height:100%;
  opacity:0;
  cursor:pointer;
}
.swatch-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.swatch-meta .eyebrow{
  font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink);opacity:.6;
}
.hexval{
  font-family:var(--font-mono);
  font-size:15px;
  font-weight:700;
  color:var(--ink);
}

.field{display:flex;flex-direction:column;gap:6px}
.field + .field{margin-top:10px}
.field-label{
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);
}
.field-label b{font-family:var(--font-mono);font-weight:700;opacity:.65}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:18px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:10px;border:2px solid var(--ink);border-radius:6px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;background:var(--paper);border:2.5px solid var(--ink);border-radius:5px;margin-top:-5px;box-shadow:2px 2px 0 var(--ink)}
input[type=range]::-moz-range-track{height:10px;border:2px solid var(--ink);border-radius:6px;background:#fff}
input[type=range]::-moz-range-thumb{width:15px;height:15px;background:var(--paper);border:2.5px solid var(--ink);border-radius:5px;box-shadow:2px 2px 0 var(--ink)}
#hueSlider::-webkit-slider-runnable-track{background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
#hueSlider::-moz-range-track{background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}

select{
  width:100%;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.02em;
  padding:8px 26px 8px 9px;
  border-radius:9px;
  border:2.5px solid var(--ink);
  background:var(--paper);
  color:var(--ink);
  cursor:pointer;
  appearance:none;-webkit-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--ink) 50%),linear-gradient(135deg,var(--ink) 50%,transparent 50%);
  background-position:calc(100% - 15px) center,calc(100% - 10px) center;
  background-size:5px 5px,5px 5px;
  background-repeat:no-repeat;
}
select:focus,input:focus{outline:2px solid var(--ink);outline-offset:2px}

.split-row{display:flex;gap:8px}
.split-row .field{flex:1;min-width:0}

.toggle-card{background:var(--cream);display:flex;align-items:center;justify-content:space-between}
.toggle-card span{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.switch-label{position:relative;display:inline-flex;cursor:pointer}
.switch-label input{position:absolute;opacity:0;width:0;height:0}
.switch{
  width:38px;height:22px;border-radius:20px;
  background:var(--paper);
  border:2.5px solid var(--ink);
  position:relative;
}
.switch::after{
  content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:4px;
  background:var(--ink);
  transition:transform .12s ease;
}
.switch-label input:checked + .switch{background:var(--mint)}
.switch-label input:checked + .switch::after{transform:translateX(15px)}

.brut-btn{
  width:100%;
  font-size:12.5px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.03em;
  padding:12px 10px;
  border-radius:12px;
  border:2.5px solid var(--ink);
  box-shadow:4px 4px 0 var(--ink);
  color:var(--ink);
  cursor:pointer;
  transition:transform .08s ease,box-shadow .08s ease;
}
.brut-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
.brut-btn.amber{background:var(--amber)}
.brut-btn.coral{background:var(--coral)}

.panel-footer{
  text-align:center;
  font-size:10.5px;
  font-style:italic;
  color:var(--ink);
  opacity:.5;
  padding-top:2px;
}

/* ---------- Stage ---------- */
.stage{flex:1;min-width:0}
.grid{display:grid;gap:8px}

.cell{
  border-radius:11px;
  border:2.5px solid var(--ink);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  padding:5px 7px;
  min-height:70px;
}
.cell-controls{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,0.4);
  align-items:center;justify-content:space-between;
  padding:6px;gap:4px;
}
.cell:hover .cell-controls{display:flex}
.cell-controls input[type=color]{
  width:28px;height:28px;padding:1px;
  border:2px solid #fff;border-radius:6px;cursor:pointer;flex-shrink:0;
}
.cell-controls .swap-btn{
  font-size:10px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;
  padding:4px 7px;border-radius:6px;
  background:rgba(255,255,255,0.25);
  border:1.5px solid #fff;
  color:#fff;cursor:pointer;white-space:nowrap;
}
.hex-label{
  font-size:9px;font-weight:700;
  font-family:var(--font-mono);
  color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,0.5);
  pointer-events:none;
}
.mode-badge{
  position:absolute;top:5px;right:5px;
  width:21px;height:21px;
  border-radius:6px;
  border:2px solid var(--ink);
  background:rgba(255,255,255,0.88);
  font-size:10px;
  font-weight:800;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  z-index:2;
  color:var(--ink);
  line-height:1;
}
.mode-badge:hover{background:#fff}

/* ---------- Reference section ---------- */
.reference-section{display:flex;flex-direction:column;gap:10px}
.ref-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 2px}
.ref-head h2{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--ink)}
.ref-head span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);opacity:.55}
.ref-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
  gap:12px;
}
.ref-chip-wrap{display:flex;flex-direction:column;gap:6px;align-items:stretch}
.ref-chip{
  border:2.5px solid var(--ink);
  border-radius:13px;
  box-shadow:3px 3px 0 var(--ink);
  overflow:hidden;
  cursor:pointer;
  background:none;
  padding:0;
  display:flex;
  flex-direction:column;
  height:96px;
  width:100%;
  transition:transform .08s ease,box-shadow .08s ease;
}
.ref-chip:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.ref-chip:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.ref-bar{flex:1}
.ref-name{
  font-size:9.5px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.02em;
  text-align:center;
  color:var(--ink);
  opacity:.7;
}
.ref-more-btn{
  align-self:center;
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.03em;
  padding:8px 18px;
  border-radius:10px;
  border:2.5px solid var(--ink);
  background:var(--paper);
  color:var(--ink);
  cursor:pointer;
  box-shadow:3px 3px 0 var(--ink);
  transition:transform .08s ease,box-shadow .08s ease;
}
.ref-more-btn:hover{background:var(--cream)}
.ref-more-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

/* ---------- Responsive ---------- */
@media (max-width:680px){
  .app{flex-direction:column;gap:12px}
  .panel{width:100%;flex:0 0 auto}
  .cell{min-height:58px}
  .page{padding:10px;gap:16px}
}
</style>

<script>
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  let max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2,s=0,h=0;
  if(max!==min){let d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
  return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}
function hslToHex(h,s,l){
  s/=100;l/=100;let a=s*Math.min(l,1-l),f=n=>{let k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return'#'+f(0)+f(8)+f(4);
}
function lighten(hex,amt){let[h,s,l]=hexToHsl(hex);return hslToHex(h,s,Math.min(90,l+amt));}
function darken(hex,amt){let[h,s,l]=hexToHsl(hex);return hslToHex(h,s,Math.max(8,l-amt));}
function getHarmonyHues(h,mode){
  if(mode==='complementary')return[h,(h+180)%360];
  if(mode==='analogous')return[h,(h+30)%360,(h-30+360)%360];
  if(mode==='triadic')return[h,(h+120)%360,(h+240)%360];
  if(mode==='split')return[h,(h+150)%360,(h+210)%360];
  if(mode==='tetradic')return[h,(h+90)%360,(h+180)%360,(h+270)%360];
  return[h];
}
function generateColors(baseHex,mode,total){
  const[h,s,l]=hexToHsl(baseHex);
  const hues=getHarmonyHues(h,mode);
  const lSteps=[l,Math.min(l+22,88),Math.max(l-18,10),Math.min(l+38,92),Math.max(l-32,6),Math.min(l+10,80)];
  const sSteps=[s,Math.min(s+12,100),Math.max(s-15,15),s,Math.min(s+20,100)];
  const out=[];
  for(let i=0;i<total*3;i++){
    const hue=hues[i%hues.length];
    const li=lSteps[Math.floor(i/hues.length)%lSteps.length];
    const si=sSteps[Math.floor(i/hues.length)%sSteps.length];
    out.push(hslToHex(hue,si,li));
  }
  return out.slice(0,total);
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

// HSV <-> hex, for the sidebar sliders (independent of the HSL harmony math above)
function hexToHsv(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  let max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h=0;
  if(d!==0){
    if(max===r)h=((g-b)/d)%6;
    else if(max===g)h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h*=60;
    if(h<0)h+=360;
  }
  const s=max===0?0:d/max,v=max;
  return[Math.round(h),Math.round(s*100),Math.round(v*100)];
}
function hsvToHex(h,s,v){
  s/=100;v/=100;
  const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;}else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  const R=Math.round((r+m)*255),G=Math.round((g+m)*255),B=Math.round((b+m)*255);
  return'#'+[R,G,B].map(n=>n.toString(16).padStart(2,'0')).join('');
}

];
const REF_PAGE_SIZE=8;
let refExpanded=false;

// State: each cell stores {c1, c2, mode} where mode is 'gradient' or 'solid'
let cells=[];

function currentGlobalMode(){
  return document.getElementById('gradToggle').checked?'gradient':'solid';
}

function buildCells(){
  const cols=parseInt(document.getElementById('cols').value);
  const rows=parseInt(document.getElementById('rows').value);
  const total=cols*rows;
  const base=document.getElementById('baseColor').value;
  const mode=document.getElementById('harmony').value;
  const colors=generateColors(base,mode,total);
  const globalMode=currentGlobalMode();
  cells=colors.map(c=>({c1:c,c2:lighten(c,22),mode:globalMode}));
}

function updateSliderTrackColors(h,s,v){
  const satTrackColorLow=hsvToHex(h,0,v),satTrackColorHigh=hsvToHex(h,100,v);
  document.getElementById('satSlider').style.background=`linear-gradient(to right,${satTrackColorLow},${satTrackColorHigh})`;
  const valTrackColorLow=hsvToHex(h,s,0),valTrackColorHigh=hsvToHex(h,s,100);
  document.getElementById('valSlider').style.background=`linear-gradient(to right,${valTrackColorLow},${valTrackColorHigh})`;
}

function updateHeadPreview(){
  const base=document.getElementById('baseColor').value;
  document.getElementById('swatchPreview').style.background=base;
  document.getElementById('hexVal').textContent=base.toUpperCase();
}

function syncSlidersFromHex(){
  const base=document.getElementById('baseColor').value;
  const[h,s,v]=hexToHsv(base);
  document.getElementById('hueSlider').value=h;
  document.getElementById('satSlider').value=s;
  document.getElementById('valSlider').value=v;
  document.getElementById('hueVal').textContent=h+'°';
  document.getElementById('satVal').textContent=s+'%';
  document.getElementById('valVal').textContent=v+'%';
  updateSliderTrackColors(h,s,v);
}

function syncHexFromSliders(){
  const h=parseInt(document.getElementById('hueSlider').value);
  const s=parseInt(document.getElementById('satSlider').value);
  const v=parseInt(document.getElementById('valSlider').value);
  document.getElementById('hueVal').textContent=h+'°';
  document.getElementById('satVal').textContent=s+'%';
  document.getElementById('valVal').textContent=v+'%';
  document.getElementById('baseColor').value=hsvToHex(h,s,v);
  updateSliderTrackColors(h,s,v);
}

function renderGrid(){
  const cols=parseInt(document.getElementById('cols').value);
  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.innerHTML='';
  cells.forEach((cell,i)=>{
    const div=document.createElement('div');
    div.className='cell';
    div.style.background=cellBackground(cell);

    // hex readout, bottom-left, always visible
    const hexLabel=document.createElement('span');
    hexLabel.className='hex-label';
    hexLabel.textContent=cell.c1.toUpperCase();
    div.appendChild(hexLabel);

    // gradient/solid toggle, top-right, always visible
    const modeBtn=document.createElement('button');
    modeBtn.className='mode-badge';
    modeBtn.title='Toggle gradient / solid';
    modeBtn.textContent=cell.mode==='gradient'?'◐':'●';
    modeBtn.addEventListener('click',e=>{
      e.stopPropagation();
      cells[i].mode=cells[i].mode==='gradient'?'solid':'gradient';
      modeBtn.textContent=cells[i].mode==='gradient'?'◐':'●';
      refreshCell(div,i);
    });
    div.appendChild(modeBtn);

    // hover controls: edit left/right colors, swap
    const ctrl=document.createElement('div');
    ctrl.className='cell-controls';

    const p1=document.createElement('input');
    p1.type='color';p1.value=cell.c1;p1.title='Left color';
    p1.addEventListener('input',e=>{cells[i].c1=e.target.value;hexLabel.textContent=cells[i].c1.toUpperCase();refreshCell(div,i);});
    p1.addEventListener('click',e=>e.stopPropagation());

    const swapBtn=document.createElement('button');
    swapBtn.className='swap-btn';swapBtn.textContent='⇄ swap';
    swapBtn.addEventListener('click',e=>{e.stopPropagation();[cells[i].c1,cells[i].c2]=[cells[i].c2,cells[i].c1];p1.value=cells[i].c1;p2.value=cells[i].c2;hexLabel.textContent=cells[i].c1.toUpperCase();refreshCell(div,i);});

    const p2=document.createElement('input');
    p2.type='color';p2.value=cell.c2;p2.title='Right color';
    p2.addEventListener('input',e=>{cells[i].c2=e.target.value;refreshCell(div,i);});
    p2.addEventListener('click',e=>e.stopPropagation());

    ctrl.appendChild(p1);ctrl.appendChild(swapBtn);ctrl.appendChild(p2);
    div.appendChild(ctrl);

    div.addEventListener('click',()=>navigator.clipboard?.writeText(cell.c1+' '+cell.c2));
    grid.appendChild(div);
  });
}

function cellBackground(cell){
  return cell.mode==='gradient'
    ?`linear-gradient(to right,${cell.c1},${cell.c2})`
    :cell.c1;
}

function refreshCell(div,i){
  div.style.background=cellBackground(cells[i]);
}

function fullRender(){updateHeadPreview();buildCells();renderGrid();}

function renderReferenceGrid(){
  const refGrid=document.getElementById('refGrid');
  const moreBtn=document.getElementById('refMoreBtn');
  refGrid.innerHTML='';
  const visible=refExpanded?REFERENCE_PALETTES:REFERENCE_PALETTES.slice(0,REF_PAGE_SIZE);
  visible.forEach(palette=>{
    const wrap=document.createElement('div');
    wrap.className='ref-chip-wrap';

    const chip=document.createElement('button');
    chip.className='ref-chip';
    chip.title='Apply '+palette.name;
    palette.colors.forEach(c=>{
      const bar=document.createElement('div');
      bar.className='ref-bar';
      bar.style.background=c;
      chip.appendChild(bar);
    });
    chip.addEventListener('click',()=>applyReferencePalette(palette.colors));

    const label=document.createElement('div');
    label.className='ref-name';
    label.textContent=palette.name;

    wrap.appendChild(chip);
    wrap.appendChild(label);
    refGrid.appendChild(wrap);
  });
  if(REFERENCE_PALETTES.length>REF_PAGE_SIZE){
    moreBtn.style.display='block';
    moreBtn.textContent=refExpanded?'Show less ▴':`Show more (${REFERENCE_PALETTES.length-REF_PAGE_SIZE}) ▾`;
  } else {
    moreBtn.style.display='none';
  }
}

document.getElementById('refMoreBtn').addEventListener('click',()=>{
  refExpanded=!refExpanded;
  renderReferenceGrid();
});

function applyReferencePalette(colors){
  const total=cells.length||3;
  const newCells=[];
  for(let i=0;i<total;i++){
    const c=colors[i%colors.length];
    const prevMode=cells[i]?cells[i].mode:currentGlobalMode();
    newCells.push({c1:c,c2:lighten(c,22),mode:prevMode});
  }
  cells=newCells;
  document.getElementById('baseColor').value=colors[0];
  syncSlidersFromHex();
  updateHeadPreview();
  renderGrid();
}

document.getElementById('baseColor').addEventListener('input',()=>{syncSlidersFromHex();fullRender();});
document.getElementById('hueSlider').addEventListener('input',()=>{syncHexFromSliders();fullRender();});
document.getElementById('satSlider').addEventListener('input',()=>{syncHexFromSliders();fullRender();});
document.getElementById('valSlider').addEventListener('input',()=>{syncHexFromSliders();fullRender();});
document.getElementById('harmony').addEventListener('change',fullRender);
document.getElementById('cols').addEventListener('change',fullRender);
document.getElementById('rows').addEventListener('change',fullRender);
document.getElementById('gradToggle').addEventListener('change',()=>{
  const mode=currentGlobalMode();
  cells.forEach(c=>c.mode=mode);
  renderGrid();
});
document.getElementById('shuffleBtn').addEventListener('click',()=>{shuffle(cells);renderGrid();});
document.getElementById('exportBtn').addEventListener('click',()=>{
  const cols=parseInt(document.getElementById('cols').value);
  const rows=Math.ceil(cells.length/cols);
  const W=cols*300,H=rows*200;
  const cv=document.getElementById('offscreen');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  cells.forEach((cell,i)=>{
    const x=(i%cols)*300,y=Math.floor(i/cols)*200;
    if(cell.mode==='gradient'){
      const g=ctx.createLinearGradient(x,0,x+300,0);
      g.addColorStop(0,cell.c1);g.addColorStop(1,cell.c2);
      ctx.fillStyle=g;
    } else {
      ctx.fillStyle=cell.c1;
    }
    ctx.fillRect(x,y,300,200);
  });
  const a=document.createElement('a');
  a.download='texture_palette.png';
  a.href=cv.toDataURL('image/png');
  a.click();
});

// First-load state: match the brand bars (amber / mint / coral) instead of the
// algorithmically generated harmony, so the very first thing you see matches
// the reference. Any control change after this regenerates normally.
function initialLoad(){
  syncSlidersFromHex();
  updateHeadPreview();
  cells=[
    {c1:'#f4bb4c',c2:lighten('#f4bb4c',22),mode:'gradient'},
    {c1:'#8fd0c4',c2:lighten('#8fd0c4',22),mode:'gradient'},
    {c1:'#f2764a',c2:lighten('#f2764a',22),mode:'gradient'}
  ];
  renderGrid();
  renderReferenceGrid();
}
initialLoad();
</script>
